name: Deploy to Azure Web App (Node 22)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install production deps
        run: |
          npm ci --omit=dev || npm install --omit=dev

      # Facultatif : tu peux ajouter ici des étapes de lint/build si tu en as

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: YOUR_WEBAPP_NAME     # <-- remplace par le nom de ton App Service
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
